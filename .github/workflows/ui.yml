name: UI CI

on:
  pull_request:
    paths:
      - 'ui/**'
      - 'docs/ui/**'
      - '.github/workflows/ui.yml'
      - 'README.md'
      - 'agijobmanager.html'
      - 'hardhat/deployments/mainnet/**'

jobs:
  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.6
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: .
      - run: npm run check:no-binaries
        working-directory: .
      - run: npm ci
      - run: npm run check:no-binaries
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test
      - run: npm run test:fuzz
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run test:a11y
      - run: npm run test:headers
      - run: npm run build:ipfs
      - run: npm run test:security
      - run: npm run docs:check
      - run: npm run verify:ipfs
      - run: npm run verify:deterministic
      - run: env -u NEXT_PUBLIC_DEMO_MODE -u NEXT_PUBLIC_DEMO_ACTOR -u NEXT_PUBLIC_CHAIN_ID -u NEXT_PUBLIC_AGI_JOB_MANAGER_ADDRESS -u NEXT_PUBLIC_AGI_TOKEN_ADDRESS npm run verify:committed-html

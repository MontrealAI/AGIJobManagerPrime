name: UI Pages Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'ui/**'
      - '.github/workflows/pages.yml'
      - 'hardhat/deployments/mainnet/**'

permissions:
  contents: write

concurrency:
  group: ui-pages-deploy
  cancel-in-progress: true

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.6
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and verify single-file UI
        run: |
          npm run build:ipfs
          npm run verify:singlefile

      - name: Prepare gh-pages payload
        run: |
          rm -rf ../.pages-dist
          mkdir -p ../.pages-dist
          cp dist-ipfs/agijobmanager.html ../.pages-dist/index.html
          cp dist-ipfs/agijobmanager.html ../.pages-dist/agijobmanager.html
          touch ../.pages-dist/.nojekyll

      - name: Publish to gh-pages
        working-directory: .pages-dist
        run: |
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html agijobmanager.html .nojekyll
          git commit -m "Deploy Sovereign Ops Console"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prime-canonical:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install hardhat dependencies
        run: |
          cd hardhat
          npm ci

      - name: Prime canonical compile/test/size/smoke
        run: npm run test:prime:ci

      - name: Prime soak smoke (reduced nightly-style profile)
        run: FOUNDRY_PROFILE=ci forge test --match-path "forge-test/invariant/PrimeProtocolInvariants.t.sol"

      - name: UI smoke test
        run: npm run test:ui
